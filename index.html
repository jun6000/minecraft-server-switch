<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

	<div id="appLoader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md transition-opacity duration-500 ease-in-out">
	    <div class="flex flex-col items-center gap-4">
		<div class="w-12 h-12 border-4 border-slate-700 border-t-emerald-500 rounded-full animate-spin"></div>
		<p class="text-slate-400 text-sm font-medium tracking-wide animate-pulse">Establishing tunnel link...</p>
	    </div>
	</div>

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-2">Minecraft Host</h1>
        <p class="text-slate-400 text-sm mb-8">Remote Power Management</p>

        <div id="loginView" class="hidden space-y-4">
            <input type="password" id="keyInput" placeholder="Access Key" 
                class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-center focus:outline-none focus:border-emerald-500">
            <button onclick="saveKey()" id="authBtn" class="w-full bg-emerald-600 font-medium py-2 rounded-lg">
                Authorize Session
            </button>
        </div>

        <div id="controlView" class="hidden flex flex-col items-center justify-center space-y-6">
            
            <label class="inline-flex items-center cursor-pointer relative">
                <input type="checkbox" id="stateToggle" onchange="handleToggleChange()" class="sr-only peer">
<div id="toggleTrack" 
     data-state="syncing"
     class="w-24 h-12 bg-slate-800 border border-slate-700 rounded-full relative flex items-center p-1 cursor-wait transition-all duration-300">
    
    <div id="toggleKnob" class="w-10 h-10 bg-slate-600 rounded-full shadow-md transition-all duration-300 transform translate-x-0"></div>
    
    <input type="checkbox" id="stateToggle" class="hidden" disabled>
</div>
            </label>

            <div id="statusMsg" class="text-sm font-medium text-slate-500 italic">Syncing with host...</div>
            
            <button onclick="clearSession()" class="text-xs text-slate-500 underline">Clear Saved Key</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://nonviviparous-vaughn-unquestioningly.ngrok-free.dev"; 
        let statusInterval = null;
        let isTransitioning = false; 
	let isFirstLoadComplete = false;

	function dismissLoader() {
	    if (isFirstLoadComplete) return;
	    
	    const loader = document.getElementById('appLoader');
	    if (loader) {
		loader.classList.add('opacity-0');
		loader.classList.add('pointer-events-none');
		
		setTimeout(() => {
		    loader.remove();
		}, 500);
	    }
	    isFirstLoadComplete = true;
	}

        window.onload = function() {
            if (localStorage.getItem('mc_access_key')) {
                showControlView();
                startPolling();
            } else {
                showLoginView();
            }
        };

        function showLoginView() {
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('controlView').classList.add('hidden');
            if(statusInterval) clearInterval(statusInterval);
        }

        function showControlView() {
            document.getElementById('controlView').classList.remove('hidden');
            document.getElementById('loginView').classList.add('hidden');
        }

        function startPolling() {
            checkRealtimeStatus();
            statusInterval = setInterval(checkRealtimeStatus, 4000);
        }

        async function saveKey() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) return;
            try {
		const response = await fetch(`${BASE_URL}/validate-key/${key}`, {
		    method: 'POST',
		    headers: { 
			'Content-Type': 'application/json',
			'ngrok-skip-browser-warning': 'true'
		    },
		    body: JSON.stringify({ key: key })
		});
                if (response.ok) {
                    localStorage.setItem('mc_access_key', key);
                    showControlView();
                    startPolling();
                } else {
                    alert("Invalid Key!");
                }
            } catch (err) {
                alert("Cannot connect to backend.");
            }
        }

        function clearSession() {
            localStorage.removeItem('mc_access_key');
            showLoginView();
        }

// 🔄 Polling: Read server state and visually set the toggle
async function checkRealtimeStatus() {
    if (isTransitioning) return; // Don't snap UI back while a request is mid-flight

    const token = localStorage.getItem('mc_access_key');
    const toggle = document.getElementById('stateToggle');
    const track = document.getElementById('toggleTrack');
    const knob = document.getElementById('toggleKnob');
    const status = document.getElementById('statusMsg');

    try {
        const response = await fetch(`${BASE_URL}/status/${token}`, {
            method: 'GET',
            headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        const data = await response.json();
        status.innerText = data.message;

        if (data.status === "online") {
            toggle.checked = true;
            toggle.disabled = false;
            track.setAttribute('data-state', 'online');
            track.className = "w-24 h-12 bg-emerald-500 rounded-full transition-all duration-300 shadow-[0_0_15px_rgba(16,185,129,0.4)] relative flex items-center p-1 cursor-pointer";
            if (knob) knob.className = "w-10 h-10 bg-white rounded-full shadow-md transition-all duration-300 transform translate-x-12";
            
        } else if (data.status === "starting") {
            toggle.checked = true;
            toggle.disabled = true; 
            track.setAttribute('data-state', 'starting');
            track.className = "w-24 h-12 bg-amber-500 rounded-full animate-pulse transition-all duration-300 relative flex items-center p-1 cursor-wait";
            if (knob) knob.className = "w-10 h-10 bg-white rounded-full shadow-md transition-all duration-300 transform translate-x-12";
            
        } else {
            toggle.checked = false;
            toggle.disabled = false;
            track.setAttribute('data-state', 'offline');
            track.className = "w-24 h-12 bg-slate-700 rounded-full transition-all duration-300 relative flex items-center p-1 cursor-pointer";
            if (knob) knob.className = "w-10 h-10 bg-white rounded-full shadow-md transition-all duration-300 transform translate-x-0";
        }
    } catch (err) {
        // 🛑 Triggered when main.py is shut down or unreachable
        status.innerText = "Host connection offline.";
        toggle.checked = false;
        toggle.disabled = true;
        track.setAttribute('data-state', 'broken');
        
        // This line guarantees the layout dimensions remain completely locked down
        track.className = "w-24 h-12 bg-slate-800 opacity-40 border border-slate-700 rounded-full relative flex items-center p-1 cursor-not-allowed transition-all duration-300";
        if (knob) knob.className = "w-10 h-10 bg-slate-500 rounded-full shadow-inner transition-all duration-300 transform translate-x-0";
    } finally {
	    dismissLoader();
    }
}

// ⚡ Execution: Fired when a user physically flips the switch
async function handleToggleChange() {
    const token = localStorage.getItem('mc_access_key');
    const toggle = document.getElementById('stateToggle');
    const track = document.getElementById('toggleTrack');
    const knob = document.getElementById('toggleKnob');
    const status = document.getElementById('statusMsg');
    
    if (isTransitioning) return; // Hard guard against event race conditions

    const targetAction = toggle.checked ? "start" : "stop";
    
    // 1. Enter strict visual lock down immediately
    isTransitioning = true; 
    toggle.disabled = true;

    // Set immediate, locked transition styles depending on the target action
    if (targetAction === "start") {
        status.innerText = "Launching server systems... Please wait.";
        if (track) track.className = "w-24 h-12 bg-amber-500 rounded-full animate-pulse transition-all duration-300 relative flex items-center p-1 cursor-wait";
        if (knob) knob.className = "w-10 h-10 bg-white rounded-full shadow-md transition-all duration-300 transform translate-x-12";
    } else {
        status.innerText = "Winding down server threads... Please wait.";
        if (track) track.className = "w-24 h-12 bg-slate-600 rounded-full animate-pulse transition-all duration-300 relative flex items-center p-1 cursor-wait";
        if (knob) knob.className = "w-10 h-10 bg-slate-400 rounded-full shadow-inner transition-all duration-300 transform translate-x-0";
    }

    try {
        await fetch(`${BASE_URL}/trigger/${token}`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify({ action: targetAction })
        });
    } catch (err) {
        console.error("Action transmission failed:", err);
        status.innerText = "Failed to transmit trigger request.";
    } finally {
        // 2. Give the host machine 15 seconds (15000ms) to clear/start tasks 
        // before letting checkRealtimeStatus overwrite the display again!
        setTimeout(() => {
            isTransitioning = false;
            // The next time polling runs naturally, it will read the true updated state!
            checkRealtimeStatus(); 
        }, 15000); // 👈 Bumped up from 1500 to 15000
    }
}
    </script>
</body>
</html>
